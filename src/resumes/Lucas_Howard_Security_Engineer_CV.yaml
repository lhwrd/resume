          - Optimized PySpark jobs on AWS EMR for credential stuffing incident analysis, halving data collection times and improving SOC agility during active investigations.
          - Led data analysis for the Microsoft 365 Copilot onboarding initiative, assessing SharePoint data posture and collaborating with SharePoint and IR teams to remediate insecure file sharing permissions before deployment.
          - Collaborated across departments to refine Vulnerability Management metrics, strengthening Nike's cybersecurity framework and executive reporting.

