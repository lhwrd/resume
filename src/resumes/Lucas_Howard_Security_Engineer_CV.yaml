    experience:
      - company: Nike, Inc.
        position: Senior Cyber Defense Incident Data Analyst
        location: Remote
        start_date: 2023-01
        end_date: present
        highlights:
          - Built and maintained a shared Python package with CI/CD pipelines, unit testing, and integration tests — including validation that Quarto template notebooks render correctly — ensuring production reliability and enabling other analysts to contribute confidently to shared tooling.
          - Leveraged GitHub Copilot and LLMs extensively to accelerate development, including building tooling in unfamiliar languages and automating analyses that would otherwise require sustained manual review; presented on practical AI-assisted development at SwooshCon to broaden adoption across engineering.
          - Automated a credential stuffing analysis playbook end-to-end, transforming a week-long manual process into a repeatable pipeline that completes in under a day — an 85%+ reduction in turnaround time — by engineering multi-step ingestion, enrichment, and reporting workflows.
          - "Engineered security tooling that integrates directly into analyst workflows: a forensic web crawler for authenticated site capture, a high-performance Box download utility with concurrency and resumable state, and a Python CLI for aggregating order data from GraphQL endpoints — each replacing a manual process with a scalable, repeatable capability."
          - Partnered with CSIRT to onboard Palo Alto XSOAR (Demisto), automating incident action plan generation and saving 20+ hours per incident; also built a migration tool to import 5+ years of historical incident data, preserving continuity during the platform transition.
          - Migrated Cyber Defense metrics from PostgreSQL to Databricks using Delta Lake, modernizing the pipeline and improving scalability; built a Databricks Asset Bundle for Tech Writing metrics using the Confluence API, and rebuilt the NCDC metrics dashboard in Tableau for sustainable stakeholder reporting.
          - Conducted impact analyses during major incidents that directly informed materials presented by the CISO to the Board, requiring rigorous, defensible analysis under sustained pressure across nights, weekends, and extended work weeks.
          - Delivered 10 live technical training sessions and a 20-hour learning plan covering Python, Git/GitHub, Docker, and production-quality development standards, resulting in teammates contributing new features to the shared package; mentored a teammate twice weekly through a master's program and Nike work.

      - company: Nike, Inc.
        position: Cyber Defense Data Analyst
        location: Remote
        start_date: "2021-10-16"
        end_date: "2023-01-02"
        highlights:
