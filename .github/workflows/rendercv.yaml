name: Render a CV

on:
  push:
    branches:
      - main
  workflow_call: # to make the workflow triggerable from other workflows (release.yaml)

permissions:
  contents: write

jobs:
  rendercv:
    name: RenderCV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install RenderCV
        run: |
          pip install -r requirements.txt
      - name: RenderCV
        run: |
          mkdir -p rendercv_output docs/resumes

          main_cv="src/Lucas_Howard_CV.yaml"
          if [ ! -f "$main_cv" ]; then
            echo "Main resume file not found: $main_cv"
            exit 1
          fi

          # Only the main resume updates README.md.
          rendercv render "$main_cv" \
            --pdf-path "rendercv_output/Lucas_Howard_CV.pdf" \
            --markdown-path "README.md"

          variant_count=0
          for cv_file in src/resumes/*_CV.yaml; do
            if [ ! -f "$cv_file" ]; then
              continue
            fi

            cv_name=$(basename "$cv_file" .yaml)
            rendercv render "$cv_file" \
              --pdf-path "rendercv_output/${cv_name}.pdf" \
              --markdown-path "docs/resumes/${cv_name}.md"

            variant_count=$((variant_count + 1))
          done

          if [ "$variant_count" -eq 0 ]; then
            echo "No variant resumes found in src/resumes."
          else
            echo "Rendered $variant_count variant resume(s)."
          fi
      - name: Upload rendercv_output as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: RenderCV Output
          path: rendercv_output
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          base: HEAD
          filters: |
            cv:
              - 'README.md'
              - 'docs/resumes/**/*.md'
      - name: Push the changes
        if: steps.changes.outputs.cv == 'true'
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add -A
          git commit -m "render the latest CV"
          git push
